version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: oferta-killer-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: senha123
      MONGO_INITDB_DATABASE: oferta-killer
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - oferta-killer-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oferta-killer-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:senha123@mongodb:27017/oferta-killer?authSource=admin
      JWT_SECRET: sua_chave_jwt_muito_segura_aqui_2024
      JWT_EXPIRE: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sua_chave_openai_aqui}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sua_chave_stripe_secreta}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-sua_chave_stripe_publica}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-seu_webhook_secret_stripe}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - oferta-killer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oferta-killer-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - oferta-killer-network

  # Nginx Reverse Proxy (Opcional para produção)
  nginx:
    image: nginx:alpine
    container_name: oferta-killer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - oferta-killer-network
    profiles:
      - production

volumes:
  mongodb_data:
    driver: local

networks:
  oferta-killer-network:
    driver: bridge